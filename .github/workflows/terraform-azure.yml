name: Terraform Azure Provisioning

on:
#  push:
#    branches:
#      - main
#    paths:
#      - 'Terraform/**'
#      - '.github/workflows/terraform-azure.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Terraform/**'
      - '.github/workflows/terraform-azure.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TERRAFORM_VERSION: 1.14.0
  AZURE_REGION: "Sweden Central"

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: test
    
    defaults:
      run:
        working-directory: ./Terraform
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.AZURE_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ secrets.AZURE_STORAGE_CONTAINER_NAME }}" \
            -backend-config="key=${{ secrets.AZURE_STATE_FILE_KEY }}" \
            -backend-config="access_key=${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}"
#        env:
#          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -no-color
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        continue-on-error: true

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_DATA: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            // Access the ENV variable using process.env
            const planOutput = process.env.PLAN_DATA;
            
            // If the plan is empty or missing, provide a fallback
            const body = planOutput 
              ? `## Terraform Plan\n\`\`\`hcl\n${planOutput}\n\`\`\``
              : "## Terraform Plan\nNo changes detected.";

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform output
